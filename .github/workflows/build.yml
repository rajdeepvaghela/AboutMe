name: Manual Trigger Workflow
on:
  workflow_dispatch:
    inputs:
      name:
        type: choice
        description: 'Which build to generate'
        options:
          - Android
          - MacOS
        required: true

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: echo "Generating build for ${{ github.event.inputs.name }}"
